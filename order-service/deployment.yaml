apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shopflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: chandanvura/shopflow-order-service:v1
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
        - name: MONGODB_URI
          value: "mongodb://admin:shopflow123@mongodb.shopflow.svc.cluster.local:27017/shopflow-orders?authSource=admin"
        - name: RABBITMQ_URL
          value: "amqp://admin:shopflow123@rabbitmq.shopflow.svc.cluster.local:5672"
        - name: JWT_SECRET
          value: "shopflow-super-secret-jwt-key-2026"