apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: chandanvura/shopflow-user-service:v1
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: MONGODB_URI
          value: "mongodb://admin:shopflow123@mongodb.shopflow.svc.cluster.local:27017/shopflow-users?authSource=admin"
        - name: JWT_SECRET
          value: "shopflow-super-secret-jwt-key-2026"
        - name: JWT_EXPIRES_IN
          value: "7d"