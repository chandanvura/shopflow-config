apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: chandanvura/shopflow-product-service:v1
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: MONGODB_URI
          value: "mongodb://admin:shopflow123@mongodb.shopflow.svc.cluster.local:27017/shopflow-products?authSource=admin"
        - name: REDIS_URL
          value: "redis://:shopflow123@redis.shopflow.svc.cluster.local:6379"