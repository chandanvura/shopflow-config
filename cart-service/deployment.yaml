apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: shopflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: chandanvura/shopflow-cart-service:v1
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: REDIS_URL
          value: "redis://:shopflow123@redis.shopflow.svc.cluster.local:6379"
        - name: JWT_SECRET
          value: "shopflow-super-secret-jwt-key-2026"